<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Insights | Mars Signs</title>
    <link rel="stylesheet" href="project-base.css">
</head>
<body>
    <header id="main-header">
        <div class="logo"><a href="/"><img src="./images/1024/20885491/Mars-logo-PpRQrZOCPddFumb2s9tzmg.svg" alt="Mars Signs"></a></div>
        <nav class="nav-links">
            <a href="projects.html">Projects</a>
            <a href="blog.html">Insights</a>
            <a href="blog.html">Insights</a>
            <a href="blog.html">Insights</a>
        </nav>
    </header>

    <!-- The container class from project-base ensures alignment -->
    <main id="blog-content" class="project-container">
        <!-- Content will be injected here -->
    </main>

    <script src="blog-data.js"></script>
    <script>
        function loadContent() {
            const hash = window.location.hash.substring(1);
            const container = document.getElementById('blog-content');
            
            // If no hash or #list, show grid. Else, show post.
            container.innerHTML = (!hash || hash === 'list') 
                ? '<h1>Industry Insights</h1>' + renderList() 
                : renderPost(hash);
            
            window.scrollTo(0, 0);
        }
        
        window.addEventListener('hashchange', loadContent);
        window.addEventListener('load', loadContent);
    </script>
</body>
</html>
